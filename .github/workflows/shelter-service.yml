# CI/CD Pipeline for shelter-service
# Triggers only when backend/shelter-service changes on main branch

name: Deploy Shelter Service

"on":
  push:
    branches:
      - main
    paths:
      - 'backend/shelter-service/**'
  workflow_dispatch:

env:
  IMAGE_NAME: shelter-service
  ACR_NAME: disaregistry456
  RESOURCE_GROUP: disa-rg
  CONTAINER_APP_NAME: shelter-service

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.SHELTER_AZURE_CREDENTIALS }}

      - name: Login to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ACR_NAME }}.azurecr.io
          username: ${{ secrets.SHELTER_ACR_USERNAME }}
          password: ${{ secrets.SHELTER_ACR_PASSWORD }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: backend/shelter-service
          file: backend/shelter-service/Dockerfile
          push: true
          tags: |
            ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.run_number }}
            ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:latest

      - name: Deploy to Container Apps
        run: |
          if az containerapp show --name ${{ env.CONTAINER_APP_NAME }} --resource-group ${{ env.RESOURCE_GROUP }} &> /dev/null; then
            az containerapp update \
              --name ${{ env.CONTAINER_APP_NAME }} \
              --resource-group ${{ env.RESOURCE_GROUP }} \
              --image ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.run_number }}
          else
            az containerapp create \
              --name ${{ env.CONTAINER_APP_NAME }} \
              --resource-group ${{ env.RESOURCE_GROUP }} \
              --environment disa-env-2 \
              --image ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.run_number }} \
              --target-port 8085 \
              --ingress external \
              --min-replicas 0 \
              --max-replicas 2 \
              --registry-server ${{ env.ACR_NAME }}.azurecr.io \
              --registry-username ${{ secrets.SHELTER_ACR_USERNAME }} \
              --registry-password ${{ secrets.SHELTER_ACR_PASSWORD }} \
              --env-vars \
                DB_URL="jdbc:postgresql://disa-shelter-db.postgres.database.azure.com:5432/shelter_db?sslmode=require" \
                DB_USERNAME="postgres" \
                DB_PASSWORD="DisaPostgres2026" \
                RABBITMQ_HOST="20.252.18.55" \
                RABBITMQ_PORT="5672" \
                RABBITMQ_USERNAME="guest" \
                RABBITMQ_PASSWORD="guest" \
                JWT_SECRET="dev-secret-key-change-in-production-at-least-32-chars"
          fi