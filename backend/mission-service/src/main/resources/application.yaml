server:
  port: ${SERVER_PORT:8086}

spring:
  application:
    name: mission-service

  datasource:
    url: ${DB_URL:jdbc:postgresql://postgres:5432/mission_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  rabbitmq:
    host: ${RABBITMQ_HOST:rabbitmq}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}
    virtual-host: ${RABBITMQ_VIRTUAL_HOST:/}

incident-service:
  url: ${INCIDENT_SERVICE_URL:http://localhost:8083}

jwt:
  secret: ${JWT_SECRET:dev-secret-key-change-in-production-at-least-32-chars}

springdoc:
  swagger-ui:
    path: /swagger-ui
  api-docs:
    path: /api-docs
  packages-to-scan: com.disa.mission_service
  default-flat-param-object: true
