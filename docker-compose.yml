services:

  # ── Infrastructure ────────────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    container_name: disa-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: disa-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:-guest}
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend services ──────────────────────────────────────────────────────

  auth-service:
    build:
      context: ./backend/auth-service
      dockerfile: Dockerfile
    container_name: disa-auth
    ports:
      - "8081:8081"
    environment:
      # Override full datasource URL so sslmode=require is not needed locally
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/auth_db
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-production}
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure

  incident-service:
    build:
      context: ./backend/incident-service
      dockerfile: Dockerfile
    container_name: disa-incident
    ports:
      - "8083:8083"
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/incident_db
      DB_USERNAME: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: ${RABBITMQ_DEFAULT_USER:-guest}
      RABBITMQ_PASSWORD: ${RABBITMQ_DEFAULT_PASS:-guest}
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: on-failure

  mission-service:
    build:
      context: ./backend/mission-service
      dockerfile: Dockerfile
    container_name: disa-mission
    ports:
      - "8086:8086"
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/mission_db
      DB_USERNAME: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: ${RABBITMQ_DEFAULT_USER:-guest}
      RABBITMQ_PASSWORD: ${RABBITMQ_DEFAULT_PASS:-guest}
      RABBITMQ_VIRTUAL_HOST: /
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: on-failure

  resource-service:
    build:
      context: ./backend/resource-service
      dockerfile: Dockerfile
    container_name: disa-resource
    ports:
      - "8089:8089"
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/resource_db
      DB_USERNAME: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: ${RABBITMQ_DEFAULT_USER:-guest}
      RABBITMQ_PASSWORD: ${RABBITMQ_DEFAULT_PASS:-guest}
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: on-failure

  shelter-service:
    build:
      context: ./backend/shelter-service
      dockerfile: Dockerfile
    container_name: disa-shelter
    ports:
      - "8085:8085"
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/shelter_db
      DB_USERNAME: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: ${RABBITMQ_DEFAULT_USER:-guest}
      RABBITMQ_PASSWORD: ${RABBITMQ_DEFAULT_PASS:-guest}
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: on-failure

  assessment-service:
    build:
      context: ./backend/assessment-service
      dockerfile: Dockerfile
    container_name: disa-assessment
    ports:
      - "8087:8087"
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/assessment_db
      DB_USERNAME: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: ${RABBITMQ_DEFAULT_USER:-guest}
      RABBITMQ_PASSWORD: ${RABBITMQ_DEFAULT_PASS:-guest}
    volumes:
      - assessment_uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: on-failure

  task-service:
    build:
      context: ./backend/task-service
      dockerfile: Dockerfile
    container_name: disa-task
    ports:
      - "8088:8088"
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/task_db
      DB_USERNAME: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: ${RABBITMQ_DEFAULT_USER:-guest}
      RABBITMQ_PASSWORD: ${RABBITMQ_DEFAULT_PASS:-guest}
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: on-failure

  # ── Frontend ──────────────────────────────────────────────────────────────

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      # All backend services are port-mapped to the host, so the browser
      # can reach them directly via localhost.  VITE_* vars are baked into
      # the JS bundle at build time.
      args:
        VITE_AUTH_SERVICE_URL: http://localhost:8081/api/auth
        VITE_MISSION_SERVICE_URL: http://localhost:8086
        VITE_RESOURCE_SERVICE_URL: http://localhost:8089
        VITE_INCIDENT_SERVICE_URL: http://localhost:8083
        VITE_SHELTER_SERVICE_URL: http://localhost:8085
        VITE_ASSESSMENT_SERVICE_URL: http://localhost:8087
        VITE_TASK_SERVICE_URL: http://localhost:8088/api/v1/tasks
    container_name: disa-frontend
    ports:
      - "80:80"
    depends_on:
      - auth-service
      - incident-service
      - mission-service
      - resource-service
      - shelter-service
      - assessment-service
      - task-service
    restart: on-failure

volumes:
  postgres_data:
  assessment_uploads:
