# Shared infrastructure: RabbitMQ message broker
# Run this first when deploying services on separate servers.
# Services connect to RabbitMQ using the RABBITMQ_HOST env var.

services:
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: disa-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
